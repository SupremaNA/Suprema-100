const CHECK = `<div class="badge badge-yes"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
const DASH  = `<div class="badge badge-no"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></div>`;

function render(query) {
  const q = query.toLowerCase().trim();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let lastCat = null, shown = 0;
  DATA.forEach(row => {
    if (q && !row.part.toLowerCase().includes(q) && !row.desc.toLowerCase().includes(q)) return;
    if (row.cat !== lastCat) {
      const tr = document.createElement('tr');
      tr.className = 'cat-row';
      tr.innerHTML = `<td colspan="5">${row.cat}</td>`;
      tbody.appendChild(tr);
      lastCat = row.cat;
    }
    const tr = document.createElement('tr');
    tr.className = 'data-row';
    tr.innerHTML = `
      <td class="part-cell">${row.part}</td>
      <td class="desc-cell">${row.desc}</td>
      <td class="tier-cell">${row.silver ? CHECK : DASH}</td>
      <td class="tier-cell">${row.gold   ? CHECK : DASH}</td>
      <td class="tier-cell">${row.plat   ? CHECK : DASH}</td>`;
    tbody.appendChild(tr);
    shown++;
  });
  document.getElementById('count').textContent = shown + ' parts';
  document.getElementById('no-results').style.display = shown === 0 ? 'block' : 'none';
}
document.getElementById('search').addEventListener('input', e => render(e.target.value));
render('');
